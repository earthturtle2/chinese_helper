# =============================================================================
# chinese_helper — Nginx 完整示例（域名：chinese.itorange.online）
#
# 使用方式：
#   1. 将本文件复制到服务器，例如：
#        sudo cp scripts/nginx.chinese.itorange.online.conf /etc/nginx/sites-available/chinese.itorange.online.conf
#   2. 若 Node 监听端口不是 3001，修改下面 upstream 或 proxy_pass 中的端口。
#   3. 若 Certbot 已生成站点配置，可把本文件中两个 server { } 合并进现有文件，或替换 server 块。
#   4. 启用站点并检查：
#        sudo ln -sf /etc/nginx/sites-available/chinese.itorange.online.conf /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#
# 说明：/api/ 必须反代到 Node（PM2），否则 POST 会 405。
# =============================================================================

# 与 ecosystem.config.js / .env 中 PORT 一致（默认 3001）
upstream chinese_helper_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# -----------------------------------------------------------------------------
# HTTP → HTTPS
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name chinese.itorange.online;

    # Certbot 验证时可能需要短暂放行；若仅用 Certbot webroot 可保留 return
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS — 静态前端 + API 反代 + 音频
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chinese.itorange.online;

    # ----- SSL（Let’s Encrypt / Certbot）-----
    ssl_certificate     /etc/letsencrypt/live/chinese.itorange.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chinese.itorange.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm;
    gzip_min_length 1024;

    # ----- API：必须放在 location / 之前（更具体前缀优先）-----
    location /api/ {
        proxy_pass http://chinese_helper_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ----- 音频：与 Node 中 data/audio 目录一致时可用静态；否则可改为 proxy_pass 到 Node -----
    location /audio/ {
        alias /data/node-apps/chinese_helper/data/audio/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ----- 前端 SPA -----
    location / {
        root /data/node-apps/chinese_helper/client/dist;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|wasm|onnx)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
