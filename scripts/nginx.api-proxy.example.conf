# Reference only — adjust paths, ssl_certificate, and upstream port (must match Node PORT, default 3001).
#
# 405 on POST https://.../api/... often happens when ONLY this exists:
#   location / { root .../dist; try_files $uri /index.html; }
# Then POST /api/... falls through to static SPA rules and Nginx rejects POST → 405.
# Fix: add location /api/ { proxy_pass ...; } so /api is never handled as static/try_files.

upstream chinese_helper_node {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 443 ssl;
    http2 on;
    server_name chinese.itorange.online;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    # SPA static files (optional if Node serves dist; many setups use Nginx for static + proxy /api only)
    location / {
        root /data/node-apps/chinese_helper/client/dist;
        try_files $uri $uri/ /index.html;
    }

    # API — must proxy to Node; must allow POST, PUT, DELETE, OPTIONS
    location /api/ {
        proxy_pass http://chinese_helper_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /audio/ {
        proxy_pass http://chinese_helper_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
